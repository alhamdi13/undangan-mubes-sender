<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKATP - Dashboard Bukber & Mubes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .smooth-scroll { -webkit-overflow-scrolling: touch; }
        .modal-open { overflow: hidden; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">
    <header class="bg-blue-700 text-white p-4 sticky top-0 z-40 shadow-lg md:relative md:bg-transparent md:text-slate-900 md:shadow-none md:p-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl md:text-3xl font-black tracking-tight uppercase">Dashboard <span class="md:text-blue-600">IKATP</span></h1>
                <p class="text-[10px] md:text-sm font-medium opacity-80 md:text-slate-500">Mubes & Buka Bersama 2026</p>
            </div>
            <div class="hidden md:block bg-green-500 text-white px-4 py-1 rounded-full text-[10px] font-bold">KONEKSI RSVP AKTIF</div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8 space-y-6">
        <!-- Statistik Dual Agenda -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Bukber 14 Mar -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Sabtu, 14 Mar (Bukber)</h3>
                    <span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-[10px] font-bold">Katering</span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div onclick="tampilkanDaftarRSVP('hadir14')" class="bg-slate-50 p-4 rounded-2xl cursor-pointer hover:bg-green-50 transition">
                        <span id="statHadir14" class="text-3xl font-black text-green-600 block">0</span>
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Hadir</span>
                    </div>
                    <div onclick="tampilkanDaftarRSVP('tidak14')" class="bg-slate-50 p-4 rounded-2xl cursor-pointer hover:bg-red-50 transition">
                        <span id="statTidak14" class="text-3xl font-black text-red-500 block">0</span>
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Berhalangan</span>
                    </div>
                </div>
            </div>
            <!-- Mubes 15 Mar -->
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Minggu, 15 Mar (Mubes)</h3>
                    <span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[10px] font-bold">Rapat</span>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div onclick="tampilkanDaftarRSVP('hadir15')" class="bg-slate-50 p-4 rounded-2xl cursor-pointer hover:bg-blue-50 transition">
                        <span id="statHadir15" class="text-3xl font-black text-blue-600 block">0</span>
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Hadir</span>
                    </div>
                    <div onclick="tampilkanDaftarRSVP('tidak15')" class="bg-slate-50 p-4 rounded-2xl cursor-pointer hover:bg-red-50 transition">
                        <span id="statTidak15" class="text-3xl font-black text-red-500 block">0</span>
                        <span class="text-[9px] font-bold text-slate-400 uppercase">Berhalangan</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input & Pesan -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Draft Pesan (14 & 15 Maret)</label>
            <textarea id="teksPesan" rows="8" class="w-full border border-slate-100 bg-slate-50 rounded-2xl p-4 text-sm leading-relaxed mb-4">Salam Alumni FT UNP. Halo {{nama}}.

Kami mengundang Anda pada rangkaian acara IKATP:
1. Sabtu, 14 Mar (13.30-20.00): Bukber, Tanya Jawab Panelis, & Santunan.
2. Minggu, 15 Mar (08.00-Selesai): Musyawarah Besar (Mubes).

Konfirmasi kehadiran Anda segera di:
https://databasealumniftunp.netlify.app/

Tutorial Login: https://drive.google.com/file/d/12TrXvSG2QKb28vAqzrfAhJNNGPAFMokz/view?usp=sharing
Tutorial RSVP: https://i.ibb.co.com/HLh8wkdg/undangan-sender.png

Data Anda sangat penting untuk menghitung porsi makanan katering.</textarea>
            <button onclick="muatData()" id="btnMuat" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold active:scale-95 transition shadow-xl">SEGARKAN DATA & HITUNG RSVP</button>
        </div>

        <!-- Daftar & Kontrol -->
        <div id="areaTabel" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm sticky top-[72px] md:relative md:top-0 z-30 flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <span id="labelStatistik" class="text-[10px] font-black text-blue-600 bg-blue-50 px-3 py-2 rounded-xl">SESI: 0 / 50</span>
                    <div class="w-32 h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div id="barProgres" class="h-full bg-blue-600 transition-all duration-700" style="width: 0%"></div>
                    </div>
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <button onclick="halamanPrev()" class="flex-1 md:flex-none px-4 py-2 bg-slate-100 rounded-xl text-[10px] font-bold">KEMBALI</button>
                    <span id="labelRentang" class="text-[10px] font-bold text-slate-400 min-w-[60px] text-center flex items-center justify-center">...</span>
                    <button onclick="halamanNext()" class="flex-1 md:flex-none px-4 py-2 bg-slate-100 rounded-xl text-[10px] font-bold">LANJUT</button>
                </div>
            </div>

            <div id="barJeda" class="hidden p-4 bg-red-600 text-white rounded-2xl shadow-lg text-center font-black text-[10px] uppercase tracking-widest">TUNGGU <span id="detikJeda">30</span> DETIK...</div>

            <div id="isiTabelMobile" class="space-y-3 pb-20"></div>
        </div>
    </main>

    <!-- Modal Daftar Nama -->
    <div id="modalDaftar" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-xl max-h-[70vh] flex flex-col shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 id="judulModal" class="font-black text-slate-900 uppercase text-sm">Daftar Alumni</h3>
                <button onclick="tutupModalDaftar()" class="text-slate-400">TUTUP</button>
            </div>
            <div class="p-4 overflow-y-auto smooth-scroll flex-1">
                <ul id="listNamaRSVP" class="space-y-2"></ul>
            </div>
        </div>
    </div>

    <script>
        let databaseAlumni = [];
        let posisiData = 0;
        const perHalaman = 20;
        let counterSesi = 0;
        const LIMIT_SESI = 50;
        const WAKTU_TUNGGU = 30;
        let kunciKeamanan = false;

        function formatNomor(input) {
            let bersih = String(input).replace(/\D/g, '');
            if (bersih.startsWith('0')) bersih = '62' + bersih.substring(1);
            if (bersih.startsWith('8')) bersih = '62' + bersih;
            return bersih;
        }

        async function muatData() {
            const url = "https://script.google.com/macros/s/AKfycbyea66hMVDpJP0t6xmR0Z_WYfRe3s2h-OeOptPmFz9v-tUAG-vWBxULjiyjErhGEgWK/exec";
            const btn = document.getElementById('btnMuat');
            btn.innerText = 'SINKRONISASI...';
            btn.disabled = true;

            try {
                const respon = await fetch(url);
                const hasil = await respon.json();
                
                let h14 = 0, t14 = 0, h15 = 0, t15 = 0, belum = 0;
                hasil.forEach(item => {
                    const r14 = (item.RSVP_14 || '-').toLowerCase();
                    const r15 = (item.RSVP_15 || '-').toLowerCase();
                    if (r14.includes('hadir') && !r14.includes('tidak')) h14++; else if (r14.includes('tidak')) t14++;
                    if (r15.includes('hadir') && !r15.includes('tidak')) h15++; else if (r15.includes('tidak')) t15++;
                    if (r14 === '-' && r15 === '-') belum++;
                });

                document.getElementById('statHadir14').innerText = h14;
                document.getElementById('statTidak14').innerText = t14;
                document.getElementById('statHadir15').innerText = h15;
                document.getElementById('statTidak15').innerText = t15;

                databaseAlumni = hasil.sort((a, b) => {
                    const rA = a.RSVP_14 === '-' && a.RSVP_15 === '-';
                    const rB = b.RSVP_14 === '-' && b.RSVP_15 === '-';
                    return rA === rB ? 0 : rA ? -1 : 1;
                });

                posisiData = 0;
                renderTabel();
                document.getElementById('areaTabel').classList.remove('hidden');
            } catch (err) { console.error(err); }
            finally { btn.innerText = 'SINKRONKAN & HITUNG TOTAL RSVP'; btn.disabled = false; }
        }

        function renderTabel() {
            const wadah = document.getElementById('isiTabelMobile');
            const draf = document.getElementById('teksPesan').value;
            const urlGas = "https://script.google.com/macros/s/AKfycbyea66hMVDpJP0t6xmR0Z_WYfRe3s2h-OeOptPmFz9v-tUAG-vWBxULjiyjErhGEgWK/exec";
            
            wadah.innerHTML = '';
            const dataHalaman = databaseAlumni.slice(posisiData, posisiData + perHalaman);
            document.getElementById('labelRentang').innerText = `${posisiData + 1}-${Math.min(posisiData + perHalaman, databaseAlumni.length)}`;

            dataHalaman.forEach(row => {
                const nama = row.nama || row.Nama;
                const r14 = row.RSVP_14 || '-';
                const r15 = row.RSVP_15 || '-';
                const hpWA = formatNomor(row.hp || row.HP);
                const isSelesai = (row.Status_WA || '').toLowerCase() === 'terkirim';
                
                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl border ${isSelesai ? 'bg-slate-50 opacity-60' : 'bg-white shadow-sm border-slate-200'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="font-bold text-slate-800 text-sm leading-tight">${nama}</h3>
                        <div class="flex gap-1">
                            <span class="px-1.5 py-0.5 rounded text-[8px] font-black uppercase ${r14.includes('Hadir') ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-400'}">SAB: ${r14}</span>
                            <span class="px-1.5 py-0.5 rounded text-[8px] font-black uppercase ${r15.includes('Hadir') ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-400'}">MIN: ${r15}</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between gap-3">
                        <span class="text-[8px] font-black uppercase ${isSelesai ? 'text-green-600' : 'text-slate-300'}">${isSelesai ? 'TERKIRIM' : 'ANTREAN'}</span>
                        <a href="https://wa.me/${hpWA}?text=${encodeURIComponent(draf.replace(/{{nama}}/g, nama))}" target="_blank" 
                           onclick="konfirmasiKirim(this, '${hpWA}', '${urlGas}')"
                           class="px-5 py-2.5 rounded-xl text-[9px] font-black uppercase text-center flex-1 ${isSelesai || kunciKeamanan || counterSesi >= LIMIT_SESI ? 'bg-slate-100 text-slate-300 pointer-events-none' : 'bg-blue-600 text-white'}">
                           ${isSelesai ? 'SUDAH' : 'KIRIM WA'}
                        </a>
                    </div>
                `;
                wadah.appendChild(card);
            });
        }

        function konfirmasiKirim(el, hp, url) {
            if (kunciKeamanan) return;
            fetch(`${url}?action=update&hp=${hp}`).catch(() => {});
            counterSesi++;
            updateProgres();
            aktifkanJeda();
        }

        function updateProgres() {
            document.getElementById('barProgres').style.width = `${(counterSesi / LIMIT_SESI) * 100}%`;
            document.getElementById('labelStatistik').innerText = `SESI: ${counterSesi} / ${LIMIT_SESI}`;
        }

        function aktifkanJeda() {
            kunciKeamanan = true;
            const bar = document.getElementById('barJeda');
            const teks = document.getElementById('detikJeda');
            bar.classList.remove('hidden');
            renderTabel();
            let sisa = WAKTU_TUNGGU;
            const timer = setInterval(() => {
                sisa--; teks.innerText = sisa;
                if (sisa <= 0) {
                    clearInterval(timer); kunciKeamanan = false; bar.classList.add('hidden');
                    if (counterSesi >= LIMIT_SESI) { bar.innerText = 'LIMIT TERCAPAI'; bar.classList.replace('bg-red-600', 'bg-slate-900'); bar.classList.remove('hidden'); }
                    else { renderTabel(); }
                }
            }, 1000);
        }

        function tampilkanDaftarRSVP(tipe) {
            const list = document.getElementById('listNamaRSVP');
            list.innerHTML = '';
            const filter = databaseAlumni.filter(item => {
                const r14 = (item.RSVP_14 || '-').toLowerCase();
                const r15 = (item.RSVP_15 || '-').toLowerCase();
                if (tipe === 'hadir14') return r14.includes('hadir') && !r14.includes('tidak');
                if (tipe === 'tidak14') return r14.includes('tidak');
                if (tipe === 'hadir15') return r15.includes('hadir') && !r15.includes('tidak');
                if (tipe === 'tidak15') return r15.includes('tidak');
                return false;
            });
            filter.forEach((item, i) => {
                const li = document.createElement('li');
                li.className = "p-3 bg-slate-50 rounded-xl text-xs font-bold border border-slate-100";
                li.innerText = `${i+1}. ${item.nama || item.Nama}`;
                list.appendChild(li);
            });
            document.getElementById('modalDaftar').classList.remove('hidden');
            document.body.classList.add('modal-open');
        }

        function tutupModalDaftar() { document.getElementById('modalDaftar').classList.add('hidden'); document.body.classList.remove('modal-open'); }
        function halamanNext() { if (posisiData + perHalaman < databaseAlumni.length) { posisiData += perHalaman; renderTabel(); window.scrollTo(0, 0); } }
        function halamanPrev() { if (posisiData - perHalaman >= 0) { posisiData -= perHalaman; renderTabel(); window.scrollTo(0, 0); } }
    </script>
</body>
</html>
