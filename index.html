<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKATP - Dashboard Bukber & Mubes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .smooth-scroll { -webkit-overflow-scrolling: touch; }
        .modal-open { overflow: hidden; }
        .active-scale:active { transform: scale(0.95); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">
    <!-- Header -->
    <header class="bg-blue-700 text-white p-4 sticky top-0 z-40 shadow-lg md:relative md:bg-transparent md:text-slate-900 md:shadow-none md:p-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl md:text-3xl font-black tracking-tight uppercase italic">Dashboard <span class="md:text-blue-600">IKATP</span></h1>
                <p class="text-[10px] md:text-sm font-medium opacity-80 md:text-slate-500">Integrasi RSVP 14 & 15 Maret 2026</p>
            </div>
            <button onclick="muatData()" class="bg-white text-blue-700 px-4 py-2 rounded-full text-[10px] font-bold shadow-md active-scale transition-all">SINKRON DATA</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8 space-y-6">
        <!-- Statistik -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic text-green-600 mb-4">SABTU, 14 MAR (BUKBER)</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div onclick="tampilkanDaftar('hadir14')" class="bg-green-50 p-4 rounded-2xl cursor-pointer hover:bg-green-100 transition active-scale border border-transparent hover:border-green-200">
                        <span id="statHadir14" class="text-3xl font-black text-green-600 block leading-none">0</span>
                        <span class="text-[9px] font-bold text-green-700 uppercase mt-1 block">Konfirmasi Hadir</span>
                    </div>
                    <div onclick="tampilkanDaftar('tidak14')" class="bg-red-50 p-4 rounded-2xl cursor-pointer hover:bg-red-100 transition active-scale border border-transparent hover:border-red-200">
                        <span id="statTidak14" class="text-3xl font-black text-red-500 block leading-none">0</span>
                        <span class="text-[9px] font-bold text-red-700 uppercase mt-1 block">Berhalangan</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic text-blue-600 mb-4">MINGGU, 15 MAR (MUBES)</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div onclick="tampilkanDaftar('hadir15')" class="bg-blue-50 p-4 rounded-2xl cursor-pointer hover:bg-blue-100 transition active-scale border border-transparent hover:border-blue-200">
                        <span id="statHadir15" class="text-3xl font-black text-blue-600 block leading-none">0</span>
                        <span class="text-[9px] font-bold text-blue-700 uppercase mt-1 block">Konfirmasi Hadir</span>
                    </div>
                    <div onclick="tampilkanDaftar('tidak15')" class="bg-red-50 p-4 rounded-2xl cursor-pointer hover:bg-red-100 transition active-scale border border-transparent hover:border-red-200">
                        <span id="statTidak15" class="text-3xl font-black text-red-500 block leading-none">0</span>
                        <span class="text-[9px] font-bold text-red-700 uppercase mt-1 block">Berhalangan</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Draft & Belum Respon -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Draft Pesan Undangan</label>
                <textarea id="teksPesan" rows="6" class="w-full border-none bg-slate-50 rounded-2xl p-4 text-sm leading-relaxed mb-4 focus:ring-2 focus:ring-blue-500 outline-none">Salam Alumni FT UNP. Halo {{nama}}.

Kami mengundang Kamu pada rangkaian acara IKATP:
1. Sabtu, 14 Mar (13.30-20.00): Bukber & Santunan.
2. Minggu, 15 Mar (08.00-Selesai): Mubes.

Konfirmasi kehadiran Kamu segera di:
https://databasealumniftunp.netlify.app/

Tutorial Login: https://drive.google.com/file/d/12TrXvSG2QKb28vAqzrfAhJNNGPAFMokz/view?usp=sharing
Tutorial RSVP: https://i.ibb.co.com/HLh8wkdg/undangan-sender.png</textarea>
                <button onclick="muatData()" id="btnMuat" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold active-scale transition shadow-xl uppercase tracking-wider text-xs">PROSES & URUTKAN PRIORITAS</button>
            </div>
            
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col justify-center text-center">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 text-blue-600">Belum Ada Respon</span>
                <span id="statBelum" class="text-5xl font-black text-slate-900">0</span>
            </div>
        </div>

        <!-- Tabel Monitoring -->
        <div id="areaTabel" class="hidden space-y-4 animate-fade">
            <div id="barJeda" class="hidden p-4 bg-red-600 text-white rounded-2xl shadow-lg text-center font-black text-[10px] uppercase tracking-widest sticky top-[72px] md:relative md:top-0 z-30">PENGAMAN: TUNGGU <span id="detikJeda">30</span> DETIK...</div>
            <div id="isiTabelMobile" class="space-y-3 pb-24"></div>
        </div>
    </main>

    <!-- Modal Daftar -->
    <div id="modalDaftar" class="fixed inset-0 bg-slate-900/80 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-white rounded-[32px] w-full max-w-xl max-h-[80vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="p-8 border-b flex justify-between items-center">
                <h3 id="judulModal" class="font-black text-slate-900 uppercase text-xs tracking-tight">Daftar Alumni</h3>
                <button onclick="tutupModal()" class="text-slate-400 p-2 active-scale"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 bg-slate-50"><ul id="listNama" class="space-y-2"></ul></div>
            <div class="p-6 bg-white"><button onclick="tutupModal()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-xs active-scale uppercase tracking-widest">Tutup</button></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyk9tk-6_xk5S36WWLmfxK4ofCB8QPHT1mnZEsIO-_Sb_rPCcTgBxKellS6t81p1HwL/exec";
        let databaseAlumni = [];
        let counterSesi = 0;
        const LIMIT_SESI = 50;
        const WAKTU_TUNGGU = 30;
        let kunciKeamanan = false;

        function formatNomor(input) {
            let bersih = String(input || '').replace(/\D/g, '');
            if (bersih.startsWith('0')) bersih = '62' + bersih.substring(1);
            else if (bersih.startsWith('8')) bersih = '62' + bersih;
            return bersih;
        }

        async function muatData() {
            const btn = document.getElementById('btnMuat');
            btn.innerText = 'MENYINKRONKAN...';
            btn.disabled = true;
            document.body.style.opacity = "0.7";

            try {
                const respon = await fetch(API_URL);
                const hasil = await respon.json();
                
                // PROTEKSI: Cek jika hasil adalah error dari GAS
                if (hasil.error) throw new Error(hasil.error);

                // PROTEKSI: Pastikan hasil adalah Array
                if (!Array.isArray(hasil)) throw new Error("Format data salah. Pastikan Apps Script di-deploy sebagai 'Anyone'.");
                
                let h14 = 0, t14 = 0, h15 = 0, t15 = 0, belum = 0;
                hasil.forEach(item => {
                    const r14 = (item.RSVP_14 || '-').toLowerCase();
                    const r15 = (item.RSVP_15 || '-').toLowerCase();
                    if (r14.includes('hadir') && !r14.includes('tidak')) h14++; else if (r14.includes('tidak')) t14++;
                    if (r15.includes('hadir') && !r15.includes('tidak')) h15++; else if (r15.includes('tidak')) t15++;
                    if (r14 === '-' && r15 === '-') belum++;
                });

                document.getElementById('statHadir14').innerText = h14;
                document.getElementById('statTidak14').innerText = t14;
                document.getElementById('statHadir15').innerText = h15;
                document.getElementById('statTidak15').innerText = t15;
                document.getElementById('statBelum').innerText = belum;

                // Sort: Prioritas yang belum isi RSVP
                databaseAlumni = hasil.sort((a, b) => {
                    const rA = (a.RSVP_14 === '-' && a.RSVP_15 === '-');
                    const rB = (b.RSVP_14 === '-' && b.RSVP_15 === '-');
                    return rA === rB ? 0 : rA ? -1 : 1;
                });

                renderTabel();
                document.getElementById('areaTabel').classList.remove('hidden');
            } catch (err) { 
                alert("Gagal memuat data: " + err.message);
                console.error(err);
            } finally { 
                btn.innerText = 'PROSES & URUTKAN PRIORITAS'; 
                btn.disabled = false;
                document.body.style.opacity = "1";
            }
        }

        function renderTabel() {
            const wadah = document.getElementById('isiTabelMobile');
            const draf = document.getElementById('teksPesan').value;
            wadah.innerHTML = '';
            
            // Batasi tampilan hanya 50 untuk performa mobile
            databaseAlumni.slice(0, 50).forEach(row => {
                const nama = row.nama || row.Nama || 'Tanpa Nama';
                const r14 = row.RSVP_14 || '-';
                const r15 = row.RSVP_15 || '-';
                const statusWA = (row.Status_WA || 'Antrean').toLowerCase();
                const isSent = statusWA === 'terkirim';
                const hp = formatNomor(row.hp || row.HP || row['No HP']);
                
                const card = document.createElement('div');
                card.className = `p-5 rounded-[32px] border transition-all ${isSent ? 'bg-slate-50 opacity-60 grayscale' : 'bg-white shadow-sm border-slate-200'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <h4 class="font-black text-slate-800 text-sm leading-tight uppercase">${nama}</h4>
                        <div class="flex flex-col gap-1 items-end">
                            <span class="text-[7px] font-black px-2 py-0.5 rounded uppercase ${r14.includes('hadir') ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-400'}">SAB: ${r14}</span>
                            <span class="text-[7px] font-black px-2 py-0.5 rounded uppercase ${r15.includes('hadir') ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-400'}">MIN: ${r15}</span>
                        </div>
                    </div>
                    <div class="flex justify-between items-center gap-4">
                        <span class="text-[8px] font-black ${isSent ? 'text-green-600' : 'text-slate-300'} uppercase tracking-widest">${statusWA}</span>
                        <a href="https://wa.me/${hp}?text=${encodeURIComponent(draf.replace(/{{nama}}/g, nama))}" target="_blank" onclick="konfirmasiKirim(this, '${hp}')" 
                           class="flex-1 text-center py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all shadow-md active-scale ${isSent || kunciKeamanan || counterSesi >= LIMIT_SESI ? 'bg-slate-100 text-slate-300 pointer-events-none' : 'bg-blue-600 text-white'}">
                           ${isSent ? 'SELESAI' : 'KIRIM WA'}
                        </a>
                    </div>
                `;
                wadah.appendChild(card);
            });
        }

        function konfirmasiKirim(el, hp) {
            if (kunciKeamanan || counterSesi >= LIMIT_SESI) return;
            fetch(`${API_URL}?action=update&hp=${hp}`).catch(() => {});
            counterSesi++;
            aktifkanJeda();
        }

        function aktifkanJeda() {
            kunciKeamanan = true;
            const bar = document.getElementById('barJeda');
            const teks = document.getElementById('detikJeda');
            bar.classList.remove('hidden');
            renderTabel();
            let sisa = WAKTU_TUNGGU;
            const timer = setInterval(() => {
                sisa--; teks.innerText = sisa;
                if (sisa <= 0) { 
                    clearInterval(timer); 
                    kunciKeamanan = false; 
                    bar.classList.add('hidden'); 
                    muatData(); 
                }
            }, 1000);
        }

        function tampilkanDaftar(tipe) {
            const list = document.getElementById('listNama');
            list.innerHTML = '';
            const filter = databaseAlumni.filter(item => {
                const r14 = (item.RSVP_14 || '-').toLowerCase();
                const r15 = (item.RSVP_15 || '-').toLowerCase();
                if (tipe === 'hadir14') return r14.includes('hadir') && !r14.includes('tidak');
                if (tipe === 'tidak14') return r14.includes('tidak');
                if (tipe === 'hadir15') return r15.includes('hadir') && !r15.includes('tidak');
                if (tipe === 'tidak15') return r15.includes('tidak');
                return false;
            });
            filter.forEach((it, i) => {
                const li = document.createElement('li');
                li.className = "p-4 bg-white rounded-2xl text-[11px] font-bold border border-slate-100 shadow-sm flex items-center gap-3";
                li.innerHTML = `<span class="bg-slate-100 w-6 h-6 rounded-full flex items-center justify-center text-[9px]">${i+1}</span> ${it.nama || it.Nama || 'Alumni'}`;
                list.appendChild(li);
            });
            document.getElementById('modalDaftar').classList.remove('hidden');
        }

        function tutupModal() { document.getElementById('modalDaftar').classList.add('hidden'); }
        window.onload = muatData;
    </script>
</body>
</html>
